name: Build & Push Storefront Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required to push to GitHub Container Registry (GHCR)

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            IMAGE_SHA=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/storefront-runner:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/storefront-runner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest
        run: echo "Image pushed to ghcr.io/${{ github.repository_owner }}/storefront-runner:latest"

  rolling-restart:
    # Rolling-restart the orchestrator so every Fly machine runs docker-init.sh,
    # which calls `docker pull` and picks up the new storefront image.
    # We re-deploy with the orchestrator's CURRENT image — no rebuild needed.
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Get current orchestrator image ref
        id: get_image
        run: |
          IMAGE_REF=$(flyctl releases --image --json --app amboras-orchestrator | jq -r '.[0].ImageRef')
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "Orchestrator image: $IMAGE_REF"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Rolling restart orchestrator to fetch new storefront image
        run: |
          flyctl deploy \
            --image "${{ steps.get_image.outputs.image_ref }}" \
            --strategy rolling \
            --app amboras-orchestrator
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Health check
        run: |
          echo "Waiting 30s for rollout to stabilize..."
          sleep 30
          curl -sf https://amboras-orchestrator.fly.dev/health && \
            echo "✅ Health check passed" || \
            echo "⚠️  Health check failed — check logs: flyctl logs --app amboras-orchestrator"
